<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>مرسل واتساب - مجموعات</title>

    <link rel="manifest" href="https://progressier.app/tQN6bS9WbWN6T7HZzI2n/progressier.json"/>
    <script defer src="https://progressier.app/tQN6bS9WbWN6T7HZzI2n/script.js"></script>

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background: linear-gradient(135deg, #075e54 0%, #128c7e 100%); min-height: 100vh; margin: 0; padding: 16px; display: flex; justify-content: center; align-items: center; }
        .card { max-width: 600px; width: 100%; background: white; border-radius: 28px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); padding: 20px; }
        h1 { font-size: 1.5rem; margin: 0 0 5px; color: #075e54; text-align: center; }
        .sub { color: #54656f; border-bottom: 1px solid #ddd; padding-bottom: 10px; margin-bottom: 15px; font-size: 0.8rem; text-align: center; }
        label { font-weight: bold; display: block; margin: 12px 0 5px; font-size: 0.85rem; }
        input, textarea, select { width: 100%; padding: 12px 14px; border: 1px solid #ccc; border-radius: 20px; font-size: 1rem; background: #fff; margin-bottom: 10px; }
        button { background: #25d366; color: white; border: none; padding: 12px; border-radius: 30px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .danger { background: #dc3545; }
        .info { background: #17a2b8; }
        .secondary { background: #128c7e; }
        .status { background: #e8f5e9; padding: 10px; border-radius: 16px; font-size: 0.8rem; margin-top: 10px; text-align: center; color: #075e54; }
        .selected-list { background: #e3f2fd; border-radius: 16px; padding: 10px; margin: 10px 0; max-height: 150px; overflow-y: auto; border: 1px dashed #2196f3; }
        .contact-item { background: white; padding: 8px 12px; border-radius: 12px; margin: 5px 0; display: flex; justify-content: space-between; align-items: center; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>📱 مرسل واتساب</h1>
    <div class="sub">🚀 المجموعات والرسائل السريعة</div>

    <label>📁 إدارة المجموعات:</label>
    <select id="groupSelect" onchange="loadGroupData()">
        <option value="">-- اختر مجموعة --</option>
    </select>
    
    <input type="text" id="newGroupName" placeholder="اسم مجموعة جديدة...">
    <div style="display: flex; gap: 5px;">
        <button class="info" onclick="addGroup()">➕ إضافة</button>
        <button class="danger" onclick="deleteGroup()">🗑 حذف</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">

    <label>👤 إضافة رقم للمجموعة الحالية:</label>
    <input type="text" id="phoneInput" placeholder="2010xxxxxxxx">
    <button class="secondary" onclick="addNumberToGroup()">➕ إضافة الرقم للقائمة</button>

    <div id="selectedContactsList" class="selected-list">
        <div style="text-align:center; color:gray;">القائمة فارغة</div>
    </div>

    <label>✏️ نص الرسالة:</label>
    <textarea id="message" rows="3" placeholder="اكتب رسالتك هنا..."></textarea>

    <button onclick="startSending()">🚀 بدء الإرسال الدوري</button>
    <button class="danger" onclick="stopSending()">⏹️ إيقاف مؤقت</button>
    
    <div id="status" class="status">جاهز للإرسال...</div>
</div>

<script>
    let groups = JSON.parse(localStorage.getItem('wa_pro_groups')) || {};
    let currentGroupName = "";
    let isSending = false;

    function init() {
        const select = document.getElementById('groupSelect');
        select.innerHTML = '<option value="">-- اختر مجموعة --</option>';
        for (let name in groups) {
            let opt = document.createElement('option');
            opt.value = name;
            opt.textContent = `${name} (${groups[name].length} رقم)`;
            select.appendChild(opt);
        }
    }

    function addGroup() {
        let name = document.getElementById('newGroupName').value.trim();
        if (name && !groups[name]) {
            groups[name] = [];
            save();
            document.getElementById('newGroupName').value = "";
            init();
        }
    }

    function deleteGroup() {
        if (currentGroupName) {
            delete groups[currentGroupName];
            currentGroupName = "";
            save();
            init();
            renderNumbers();
        }
    }

    function loadGroupData() {
        currentGroupName = document.getElementById('groupSelect').value;
        renderNumbers();
    }

    function addNumberToGroup() {
        let num = document.getElementById('phoneInput').value.trim();
        if (currentGroupName && num) {
            groups[currentGroupName].push(num);
            document.getElementById('phoneInput').value = "";
            save();
            renderNumbers();
        } else if (!currentGroupName) {
            alert("اختار مجموعة الأول يا مينا");
        }
    }

    function removeNumber(index) {
        groups[currentGroupName].splice(index, 1);
        save();
        renderNumbers();
    }

    function renderNumbers() {
        let list = document.getElementById('selectedContactsList');
        if (!currentGroupName || groups[currentGroupName].length === 0) {
            list.innerHTML = '<div style="text-align:center; color:gray;">القائمة فارغة</div>';
            return;
        }
        list.innerHTML = groups[currentGroupName].map((num, i) => `
            <div class="contact-item">
                <span>${num}</span>
                <button onclick="removeNumber(${i})" style="width:30px; height:30px; padding:0; background:#dc3545; border-radius:50%;">✕</button>
            </div>
        `).join('');
    }

    function save() {
        localStorage.setItem('wa_pro_groups', JSON.stringify(groups));
    }

    async function startSending() {
        if (!currentGroupName || groups[currentGroupName].length === 0) return alert("مفيش أرقام للإرسال!");
        isSending = true;
        let msg = encodeURIComponent(document.getElementById('message').value);
        let status = document.getElementById('status');

        for (let i = 0; i < groups[currentGroupName].length; i++) {
            if (!isSending) break;
            let phone = groups[currentGroupName][i];
            status.innerText = `⏳ جاري الإرسال إلى ${phone}... (${i+1}/${groups[currentGroupName].length})`;
            
            window.location.href = `intent://send?phone=${phone}&text=${msg}#Intent;scheme=whatsapp;package=com.whatsapp;end;`;
            
            // انتظار 7 ثواني قبل الرقم التالي لضمان عدم الحظر وسلاسة التنقل
            await new Promise(r => setTimeout(r, 7000));
        }
        isSending = false;
        status.innerText = "✅ تمت المهمة بنجاح!";
    }

    function stopSending() {
        isSending = false;
        document.getElementById('status').innerText = "⏹️ تم الإيقاف";
    }

    window.onload = init;
</script>

</body>
</html>
